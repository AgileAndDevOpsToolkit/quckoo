<div class="main-container">

    <input type="text" [(ngModel)]="qrCodeText">
    <!-- <input type="text" [(ngModel)]="errorCorrectionLevel" placeholder="L, M, Q, H"> -->

    <select [(ngModel)]="errorCorrectionLevel" id="qr-select">
        <option value="L">Low ~7% correction</option>
        <option value="M">Medium ~15% correction</option>
        <option value="Q">Quartile ~25% correction</option>
        <option value="H">High ~30% correction</option>
      </select>

    <button (click)="generateQRCode()">Generate QR code</button>

    <!-- Options de téléchargement si un QR code est généré -->
    @if (hasQrCode) {
      <div class="download-container">
        <div class="options-group">
          <label>Fond du PNG :</label>
          <label class="radio-label">
            <input type="radio" [(ngModel)]="transparentBackground" [value]="false"> Blanc
          </label>
          <label class="radio-label">
            <input type="radio" [(ngModel)]="transparentBackground" [value]="true"> Transparent
          </label>
        </div>
        <button class="download-btn" (click)="downloadAsPNG()">Télécharger en PNG</button>
      </div>
    }

    <!-- Le QR code SVG sera affiché ici -->
    <div #qrcode></div>



</div>
